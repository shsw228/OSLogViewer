name: Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # OSLogViewer uses iOS 26 APIs (Liquid Glass), so docbuild needs the iOS 26 SDK.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Build DocC archive
        run: |
          xcodebuild docbuild \
            -scheme OSLogViewer \
            -destination 'generic/platform=iOS' \
            -derivedDataPath .derivedData

      - name: Transform for static hosting
        run: |
          ARCHIVE="$(find .derivedData -name 'OSLogViewer.doccarchive' -type d | head -1)"
          "$(xcrun --find docc)" process-archive transform-for-static-hosting \
            "$ARCHIVE" \
            --output-path _site \
            --hosting-base-path OSLogViewer
          # Redirect the site root to the module's documentation landing page.
          echo '<script>window.location.href += "documentation/oslogviewer/"</script>' > _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
